<h2>{{ course.name }}</h2>

<div class="container">
    {% for lesson in course.lesson_set.all %}
        <div class="card mb-3">
            <div class="card-body">
                <h5>{{ lesson.title }}</h5>
                <p>{{ lesson.content }}</p>
            </div>
        </div>
    {% endfor %}
</div>
